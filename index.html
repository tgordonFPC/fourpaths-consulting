<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Four Paths Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060b16;
      --surface: #0d1526;
      --surface2: #111d33;
      --border: #1a2a45;
      --accent: #3b82f6;
      --accent-dim: #1d4ed8;
      --accent-glow: rgba(59,130,246,0.25);
      --text: #e2e8f5;
      --muted: #6b8099;
      --subtle: #1e3050;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(59,130,246,0.08) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 5%;
      height: 70px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(6,11,22,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(59,130,246,0.12);
      transition: background 0.3s;
    }

    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--accent); }

    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    .nav-cta {
      background: var(--accent);
      color: #fff !important;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-weight: 600 !important;
      transition: background 0.2s, box-shadow 0.2s !important;
    }
    .nav-cta:hover {
      background: #5094ff !important;
      box-shadow: 0 0 20px var(--accent-glow) !important;
      color: #fff !important;
    }

    /* Sections */
    section { padding: 100px 5%; }
    .container { max-width: 1100px; margin: 0 auto; }

    /* Hero */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding-top: 140px;
      padding-bottom: 100px;
      position: relative;
      overflow: hidden;
    }

    #hero::after {
      content: '';
      position: absolute;
      top: -200px; right: -300px;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.25);
      padding: 0.35rem 1rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .hero-eyebrow::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    .gradient-text {
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 560px;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }

    .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .btn-primary:hover {
      background: #5094ff;
      box-shadow: 0 4px 30px rgba(59,130,246,0.5);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.95rem;
      text-decoration: none;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      background: rgba(59,130,246,0.06);
      transform: translateY(-1px);
    }

    /* Sequence bar */
    .sequence-bar {
      display: flex; align-items: center; gap: 0.5rem;
      margin-top: 3.5rem;
      flex-wrap: wrap;
    }
    .seq-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
    }
    .seq-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.08); }
    .seq-arrow { color: var(--border); font-size: 1rem; }

    /* Section headers */
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .section-sub {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 580px;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    /* About */
    #about { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }
    @media (max-width: 768px) { .about-grid { grid-template-columns: 1fr; gap: 2rem; } }

    .about-visual {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .about-visual::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
    }

    .path-flow {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .path-step {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 0;
    }
    .path-step:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .step-num {
      width: 32px; height: 32px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--accent);
      flex-shrink: 0;
    }

    .step-info h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.15rem;
    }
    .step-info p { font-size: 0.8rem; color: var(--muted); }

    /* Paths */
    #paths { }

    .paths-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    .path-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
      cursor: default;
    }
    .path-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .path-card:hover {
      border-color: rgba(59,130,246,0.4);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(59,130,246,0.12);
    }
    .path-card:hover::before { opacity: 1; }

    .card-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.7;
    }

    .card-icon {
      width: 48px; height: 48px;
      background: rgba(59,130,246,0.1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.25rem;
      font-size: 1.4rem;
    }

    .path-card h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .path-card ul {
      list-style: none;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .path-card ul li {
      font-size: 0.83rem;
      color: var(--muted);
      padding-left: 1rem;
      position: relative;
    }
    .path-card ul li::before {
      content: '›';
      position: absolute; left: 0;
      color: var(--accent);
    }

    /* Clients */
    #clients { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .clients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-top: 2.5rem;
    }

    .client-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex; align-items: flex-start; gap: 1rem;
    }

    .client-icon {
      width: 40px; height: 40px;
      background: rgba(59,130,246,0.1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .client-card h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    .client-card p { font-size: 0.8rem; color: var(--muted); }

    /* CTA */
    #cta {
      text-align: center;
    }

    .cta-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4rem 3rem;
      position: relative;
      overflow: hidden;
    }
    .cta-box::before {
      content: '';
      position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.12) 0%, transparent 70%);
    }
    .cta-box h2 { margin-bottom: 1rem; }
    .cta-box p { color: var(--muted); max-width: 480px; margin: 0 auto 2rem; }

    /* Contact */
    #contact { background: var(--surface); border-top: 1px solid var(--border); }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 4rem;
      align-items: flex-start;
    }
    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; gap: 2.5rem; } }

    .contact-info h2 { margin-bottom: 1rem; }
    .contact-info p { color: var(--muted); line-height: 1.7; margin-bottom: 2rem; }

    .contact-detail {
      display: flex; flex-direction: column; gap: 1rem;
    }
    .detail-item {
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.9rem; color: var(--muted);
    }
    .detail-icon {
      width: 36px; height: 36px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    /* Form */
    .contact-form {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

    .form-group {
      display: flex; flex-direction: column; gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-group select option { background: var(--surface); }

    .form-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.9rem;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .form-submit:hover:not(:disabled) {
      background: #5094ff;
      box-shadow: 0 4px 30px rgba(59,130,246,0.5);
      transform: translateY(-1px);
    }
    .form-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .form-status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      text-align: center;
    }
    .form-status.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #10b981; }
    .form-status.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 5%;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
    }
    .footer-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }
    .footer-logo span { color: var(--accent); }
    footer p { font-size: 0.8rem; color: var(--muted); }

    /* Tweaks panel */
    #tweaks-panel {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      width: 280px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: none;
    }
    #tweaks-panel h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }
    .tweak-group { margin-bottom: 1.25rem; }
    .tweak-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .tweak-group select, .tweak-group input[type=color], .tweak-group input[type=range] { width: 100%; }
    .tweak-group select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.75rem;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }
    .tweak-group input[type=color] {
      height: 36px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer;
    }
    .tweak-group input[type=range] { accent-color: var(--accent); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      section { padding: 70px 5%; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<div id="tweaks-panel">
  <h4>Tweaks</h4>
  <div class="tweak-group">
    <label>Accent Color</label>
    <input type="color" id="tweak-accent" value="#3b82f6" oninput="applyTweak('accent', this.value)" />
  </div>
  <div class="tweak-group">
    <label>Heading Font</label>
    <select id="tweak-font" onchange="applyTweak('font', this.value)">
      <option value="Space Grotesk">Space Grotesk</option>
      <option value="Syne">Syne</option>
      <option value="DM Sans">DM Sans</option>
      <option value="Outfit">Outfit</option>
    </select>
  </div>
  <div class="tweak-group">
    <label>Background Tone</label>
    <select id="tweak-bg" onchange="applyTweak('bg', this.value)">
      <option value="#060b16">Deep Navy (default)</option>
      <option value="#0a0a0f">Near Black</option>
      <option value="#0b1018">Dark Slate</option>
    </select>
  </div>
</div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#3b82f6",
  "font": "Space Grotesk",
  "bg": "#060b16"
}/*EDITMODE-END*/;

// ✅ Formspree form configured
const FORMSPREE_URL = 'https://formspree.io/f/xlgzkwyb';

function App() {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [formSubmitted, setFormSubmitted] = React.useState(false);

  const paths = [
    {
      num: '01',
      icon: '🗺',
      title: 'Process Documentation',
      items: ['Map how work is actually performed', 'Identify inefficiencies and bottlenecks', 'Create clear, repeatable workflows', 'Establish the foundation for all improvements'],
    },
    {
      num: '02',
      icon: '🗄',
      title: 'Data & Systems',
      items: ['Identify appropriate systems (CRM, ERP, SharePoint)', 'Design structured data storage and access', 'Align systems with real workflows'],
    },
    {
      num: '03',
      icon: '⚡',
      title: 'Automation',
      items: ['Eliminate repetitive manual tasks', 'Implement workflows using Power Automate', 'Improve speed, accuracy, and consistency'],
    },
    {
      num: '04',
      icon: '🤖',
      title: 'AI Integration',
      items: ['Apply AI to structured data and processes', 'Enable decision support and reporting insights', 'Support predictive analysis and content generation'],
    },
  ];

  const clients = [
    { icon: '🏢', title: 'Small to Mid-Sized Orgs', desc: 'Organizations looking to modernize operations without enterprise-level complexity.' },
    { icon: '⚙', title: 'Manual Workflow Teams', desc: 'Teams burdened by repetitive, inefficient, or undocumented processes.' },
    { icon: '☁', title: 'Microsoft Ecosystem Users', desc: 'Organizations using or adopting M365, SharePoint, Power Platform, or Azure.' },
    { icon: '🔮', title: 'AI-Ready Businesses', desc: 'Businesses exploring AI but lacking the structured data and process foundation.' },
  ];

  const handleFormSubmit = (e) => {
    if (FORMSPREE_URL.includes('YOUR_FORMSPREE_ID')) {
      e.preventDefault();
      alert('⚠️ Error: Please update the FORMSPREE_URL in the HTML file with your actual Formspree form ID before submitting forms.');
      return;
    }
    // Allow Formspree to handle the submission
  };

  return (
    <>
      {/* Nav */}
      <nav>
        <div className="nav-logo">
          <svg viewBox="0 0 260 52" height="48" xmlns="http://www.w3.org/2000/svg" style={{display:'block'}}>

<script>
// Tweaks system
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

function applyTweak(key, val) {
  if (key === 'accent') {
    document.documentElement.style.setProperty('--accent', val);
    document.documentElement.style.setProperty('--accent-glow', val + '40');
  }
  if (key === 'font') {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${val.replace(/ /g,'+')}:wght@400;600;700&display=swap`;
    document.head.appendChild(link);
    document.querySelectorAll('h1,h2,h3,.nav-logo,.footer-logo').forEach(el => el.style.fontFamily = `'${val}', sans-serif`);
  }
  if (key === 'bg') {
    document.documentElement.style.setProperty('--bg', val);
  }
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
}

// Apply defaults
const d = /*EDITMODE-BEGIN*/{"accent":"#3b82f6","font":"Space Grotesk","bg":"#060b16"}/*EDITMODE-END*/;
if (d.accent !== '#3b82f6') applyTweak('accent', d.accent);
if (d.font !== 'Space Grotesk') applyTweak('font', d.font);
if (d.bg !== '#060b16') applyTweak('bg', d.bg);
</script>
